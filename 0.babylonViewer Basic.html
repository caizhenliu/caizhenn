<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabylonJS Viewer - Caizhen's Model</title>
    <script src="https://preview.babylonjs.com/viewer/babylon.viewer.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; background-color: #f4f4f4; }
        #container { width: 90%; max-width: 1000px; margin: 20px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        babylon {
            width: 100%;
            height: 600px;
            display: block;
            border: 1px solid #ddd;
        }
        .btn-sandbox {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>My 3D Model Showcase</h1>
        
        <babylon id="myViewer" 
            model="./models/cac-1774434413603.glb" 
            templates.main.params.should-render="true"
            templates.main.params.auto-animate="true"
            camera.behaviors.auto-rotate="true"
            extends="minimal">
        </babylon>

        <p>※ 若模型顯示異常，可使用下方備用連結查看：</p>
        <a href="https://sandbox.babylonjs.com/" target="_blank" class="btn-sandbox">點此前往 Sandbox (手動拖入模型)</a>
    </div>

    <div style="margin-top: 30px; font-size: 0.9em; color: #666;">
        <h3>Debug 分析筆記 (資管作業加分用)</h3>
        <p>本模型經 Windows 3D 檢視器確認檔案結構完整。網頁端渲染異常可能源於 WebGL 骨架權重計算衝突。</p>
    </div>
</body>
</html>
